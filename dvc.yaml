stages:
  validate_data:
    cmd: python3 -m src.credit_risk.data.validate
    deps:
      - src/credit_risk/data/validate.py
      - src/credit_risk/config.py
      - configs/logging.yaml
    params:
      - dataset
      - validation
    outs:
      - data/processed/german_credit_validated.csv:
          persist: true

  preprocess_data:
    cmd: python3 -m src.credit_risk.data.preprocess
    deps:
      - data/processed/german_credit_validated.csv
      - src/credit_risk/data/preprocess.py
      - src/credit_risk/config.py
      - configs/logging.yaml
    params:
      - dataset
      - preprocessing
    outs:
      - data/processed/credit_risk_features.csv:
          persist: true

  infer_schema:
    cmd: python3 -m src.credit_risk.data.schema
    deps:
      - data/processed/credit_risk_features.csv
      - src/credit_risk/data/schema.py
      - src/credit_risk/config.py
      - configs/logging.yaml
    params:
      - dataset
    outs:
      - data/processed/schema.json:
          persist: true

  split_data:
    cmd: python3 -m src.credit_risk.data.splitter
    deps:
      - data/processed/credit_risk_features.csv
      - src/credit_risk/data/splitter.py
      - src/credit_risk/config.py
      - configs/logging.yaml
    params:
      - dataset
      - split
    outs:
      - data/processed/train.csv:
          persist: true
      - data/processed/validation.csv:
          persist: true
      - data/processed/test.csv:
          persist: true

  optimize_model:
    cmd: python3 -m src.credit_risk.modeling.optimize
    deps:
      - data/processed/train.csv
      - data/processed/validation.csv
      - src/credit_risk/modeling/optimize.py
      - src/credit_risk/modeling/train.py
      - src/credit_risk/modeling/metrics.py
      - src/credit_risk/config.py
      - configs/logging.yaml
    params:
      - dataset
      - model
      - optuna
      - mlflow
    outs:
      - models/best_params.json
      - models/optuna_study.db:
          persist: true

  train_model:
    cmd: python3 -m src.credit_risk.modeling.train
    deps:
      - data/processed/train.csv
      - data/processed/validation.csv
      - models/best_params.json
      - src/credit_risk/modeling/train.py
      - src/credit_risk/modeling/metrics.py
      - src/credit_risk/config.py
      - configs/logging.yaml
    params:
      - dataset
      - model
      - mlflow
    outs:
      - models/model.pkl
      - models/metrics.json
