dataset:
  raw_path: data/raw/german_credit.csv
  processed_path: data/processed/german_credit_validated.csv
  final_path: data/processed/credit_risk_features.csv
  train_path: data/processed/train.csv
  validation_path: data/processed/validation.csv
  test_path: data/processed/test.csv
  schema_path: data/processed/schema.json
  target_column: credit_risk
  allow_missing_raw: true

validation:
  min_rows: 100
  expected_columns: 21
  allowed_targets:
    - good
    - bad

preprocessing:
  drop_duplicates: true
  encode_target: true
  target_mapping:
    good: 0
    bad: 1

split:
  train_size: 0.70
  validation_size: 0.15
  test_size: 0.15
  stratify: true
  random_state: 42

model:
  random_state: 42
  test_size: 0.2

mlflow:
  tracking_uri: mlruns
  experiment_name: credit-risk
  registered_model_name: credit-risk-model
